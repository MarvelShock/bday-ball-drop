<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Birthday Overlay</title>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@600;700&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    html,body{width:900px;height:600px;overflow:hidden;background:transparent;font-family:'Quicksand',sans-serif;}
    #scene{position:relative;width:900px;height:600px;overflow:hidden;}
    #bg-glow{
      position:absolute;inset:0;
      background:
        radial-gradient(ellipse 600px 300px at 50% 110%,rgba(244,114,182,.18) 0%,transparent 70%),
        radial-gradient(ellipse 400px 200px at 20% 0%, rgba(96,165,250,.12)   0%,transparent 70%),
        radial-gradient(ellipse 400px 200px at 80% 0%, rgba(244,114,182,.10)  0%,transparent 70%);
      pointer-events:none;z-index:1;
    }

    /* ── Countdown display ── */
    #countdown-wrap{
      position:absolute;top:18px;left:50%;
      transform:translateX(-50%);
      z-index:20;width:780px;height:96px;perspective:800px;
    }
    /* All 4 zone cards always rendered, visibility driven by classes */
    #tz-row{
      position:absolute;inset:0;
      display:flex;align-items:center;justify-content:center;gap:10px;
    }
    .tz-block{
      background:rgba(10,0,30,.65);
      border:1px solid rgba(244,114,182,.3);
      border-radius:14px;padding:9px 14px;
      text-align:center;min-width:164px;
      backdrop-filter:blur(6px);
      box-shadow:0 0 12px rgba(244,114,182,.1),inset 0 1px 0 rgba(255,255,255,.06);
      transition:border-color .4s,box-shadow .4s,opacity .4s,transform .4s;
    }
    /* Next-up zone: blue accent */
    .tz-block.next-up{
      border-color:rgba(96,165,250,.8);
      box-shadow:0 0 22px rgba(96,165,250,.35),inset 0 1px 0 rgba(255,255,255,.09);
      transform:scale(1.05);
    }
    /* Currently dropping: bright pink */
    .tz-block.dropping{
      border-color:rgba(244,114,182,.95);
      box-shadow:0 0 28px rgba(244,114,182,.55),inset 0 1px 0 rgba(255,255,255,.1);
      transform:scale(1.08);
    }
    /* Already done: dim */
    .tz-block.done-tz{
      opacity:.38;
      transform:scale(.96);
    }
    .tz-label{font-size:.6rem;color:#f9a8d4;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:3px;}
    .tz-block.next-up .tz-label{color:#93c5fd;}
    .tz-block.dropping .tz-label{color:#fff;}
    .tz-time{font-size:1.45rem;font-weight:700;color:#fff;letter-spacing:2px;font-variant-numeric:tabular-nums;}
    .tz-time.hit{color:#f472b6;}

    /* ── "Now arriving" banner ── */
    #arriving-banner{
      position:absolute;top:118px;left:50%;
      transform:translateX(-50%);
      z-index:22;
      font-size:.85rem;font-weight:700;
      color:#f9a8d4;letter-spacing:1px;text-transform:uppercase;
      opacity:0;transition:opacity .5s;
      white-space:nowrap;
      text-shadow:0 0 10px rgba(244,114,182,.6);
    }
    #arriving-banner.show{opacity:1;}

    /* ── Progress dots ── */
    #progress-dots{
      position:absolute;top:126px;left:50%;
      transform:translateX(-50%);
      display:flex;gap:8px;z-index:22;
    }
    .pdot{width:10px;height:10px;border-radius:50%;background:rgba(244,114,182,.25);transition:background .4s,box-shadow .4s;}
    .pdot.done-dot{background:#f472b6;box-shadow:0 0 8px #f472b6;}
    .pdot.next-dot{background:#93c5fd;box-shadow:0 0 6px #93c5fd;}

    /* ── Pole ── */
    #pole{
      position:absolute;left:50%;top:0;
      transform:translateX(-50%);
      width:3px;height:480px;
      background:linear-gradient(to bottom,#ec4899 0%,#3b82f6 60%,#1e1b4b 100%);
      border-radius:2px;box-shadow:0 0 8px rgba(236,72,153,.4);z-index:13;
    }
    /* ── Ball ── */
    #ball{
      position:absolute;left:50%;top:0;
      transform:translate(-50%,-50%);
      width:54px;height:54px;border-radius:50%;
      background:radial-gradient(circle at 35% 35%,#fff 4%,#fbcfe8 22%,#ec4899 52%,#1d4ed8 100%);
      box-shadow:0 0 18px 5px rgba(236,72,153,.7),0 0 40px 10px rgba(59,130,246,.35);
      z-index:16;
    }
    /* ── Message ── */
    #message{
      position:absolute;bottom:54px;left:50%;
      transform:translateX(-50%);
      font-size:2.75rem;font-weight:700;
      background:linear-gradient(135deg,#f472b6,#60a5fa,#f9a8d4,#93c5fd);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;
      text-align:center;white-space:nowrap;
      opacity:0;transition:opacity 1s ease .4s;
      z-index:25;filter:drop-shadow(0 0 14px rgba(244,114,182,.8));
    }
    #message.show{opacity:1;}
    canvas{position:absolute;top:0;left:0;width:900px;height:600px;pointer-events:none;}
    #fireworks-canvas{z-index:10;}#confetti-canvas{z-index:11;}#sparkle-canvas{z-index:12;}
    #test-btn{display:none;}
  </style>
</head>
<body>
<div id="scene">
  <div id="bg-glow"></div>
  <canvas id="fireworks-canvas" width="900" height="600"></canvas>
  <canvas id="confetti-canvas"  width="900" height="600"></canvas>
  <canvas id="sparkle-canvas"   width="900" height="600"></canvas>

  <div id="countdown-wrap">
    <div id="tz-row"></div>
  </div>
  <div id="arriving-banner"></div>
  <div id="progress-dots"></div>

  <div id="pole"></div>
  <div id="ball"></div>
  <div id="message">🎉 Happy Birthday Nicole! 🎂</div>
  <button id="test-btn">Test Celebration</button>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════════════════
const BDAY_MONTH = 7;
const BDAY_DAY   = 16;

// Timezones in order they hit midnight — earliest first
const ZONES = [
  { label:'Eastern',  abbr:'ET', tz:'America/New_York'    },
  { label:'Central',  abbr:'CT', tz:'America/Chicago'     },
  { label:'Mountain', abbr:'MT', tz:'America/Denver'      },
  { label:'Pacific',  abbr:'PT', tz:'America/Los_Angeles' },
];

// ═══════════════════════════════════════════════════════════════
// COMPUTE EACH TIMEZONE'S MIDNIGHT JULY 16
// ═══════════════════════════════════════════════════════════════
function tzMidnight(tz) {
  // Binary-search for the UTC instant that equals midnight July 16 in `tz`
  const fmt = new Intl.DateTimeFormat('en-US', {
    timeZone: tz, year:'numeric', month:'2-digit', day:'2-digit',
    hour:'2-digit', minute:'2-digit', second:'2-digit', hour12: false
  });
  // Bracket: July 16 local midnight must be somewhere in a ±14h window around
  // a naive UTC midnight for that date.
  let lo = new Date(Date.UTC(new Date().getFullYear(), BDAY_MONTH-1, BDAY_DAY) - 14*3600e3);
  let hi = new Date(+lo + 28*3600e3);
  for (let i = 0; i < 48; i++) {
    const mid = new Date((+lo + +hi) / 2);
    const p = {};
    fmt.formatToParts(mid).forEach(x => p[x.type] = x.value);
    const mo=+p.month, d=+p.day, h=+p.hour, m=+p.minute, s=+p.second;
    const hit = mo===BDAY_MONTH && d===BDAY_DAY && h===0 && m===0 && s===0;
    if (hit) return mid;
    const past = mo>BDAY_MONTH || (mo===BDAY_MONTH && d>BDAY_DAY) ||
                 (mo===BDAY_MONTH && d===BDAY_DAY && (h>0||m>0||s>0));
    if (past) hi = mid; else lo = mid;
  }
  return lo;
}

const MIDNIGHT = ZONES.map(z => ({ ...z, target: tzMidnight(z.tz) }));
// Sort ascending by UTC time (should already be ordered ET→CT→MT→PT)
MIDNIGHT.sort((a,b) => a.target - b.target);

// ═══════════════════════════════════════════════════════════════
// BUILD UI
// ═══════════════════════════════════════════════════════════════
const tzRow   = document.getElementById('tz-row');
const dots    = document.getElementById('progress-dots');
const banner  = document.getElementById('arriving-banner');

const cards = MIDNIGHT.map(z => {
  const card = document.createElement('div');
  card.className = 'tz-block';
  card.innerHTML = `<div class="tz-label">${z.label} (${z.abbr})</div>` +
                   `<div class="tz-time" id="time-${z.abbr}">--:--:--</div>`;
  tzRow.appendChild(card);
  const dot = document.createElement('div');
  dot.className = 'pdot';
  dots.appendChild(dot);
  return { zone: z, card, dot, el: null };
});
cards.forEach(c => { c.el = document.getElementById('time-'+c.zone.abbr); });

// ═══════════════════════════════════════════════════════════════
// BALL + STATE
// ═══════════════════════════════════════════════════════════════
const ball = document.getElementById('ball');
const msg  = document.getElementById('message');

// droppedCount: how many zones have already fired
let droppedCount = 0;
let isDropping   = false;   // ball currently mid-animation

// Determine on load: how many zones have ALREADY passed midnight?
MIDNIGHT.forEach((z,i) => {
  if (Date.now() > z.target.getTime() + 30000) {
    // 30s grace — if we loaded right at midnight, still play
    droppedCount = i + 1;
  }
});

function setBallTop(px, duration, easing) {
  ball.style.transition = duration ? `top ${duration}ms ${easing}` : 'none';
  ball.style.top = px + 'px';
}
setBallTop(0, 0);

// ── Ball drop for zone index i ──
function dropForZone(i) {
  if (isDropping) return;
  isDropping = true;
  const isFinal = (i === MIDNIGHT.length - 1);
  const dropTo  = isFinal ? 480 : 360;
  const label   = MIDNIGHT[i].label;

  // Mark card as dropping
  cards[i].card.classList.add('dropping');
  cards[i].dot.classList.add('done-dot');

  // Show arriving banner
  banner.textContent = `🎂 July 16 arrives in ${label}!`;
  banner.classList.add('show');

  // Drop
  setBallTop(dropTo, isFinal ? 2400 : 1600, 'cubic-bezier(.4,0,.2,1)');

  if (isFinal) {
    // Final drop → full celebration, no reset
    setTimeout(() => {
      msg.classList.add('show');
      launchFireworks();
      startConfetti();
      startSparkles();
      banner.classList.remove('show');
    }, 2600);
  } else {
    // Non-final drop → reset ball after pause, advance droppedCount
    setTimeout(() => {
      setBallTop(0, 900, 'cubic-bezier(.2,0,.6,1)');  // rise back up
      setTimeout(() => {
        banner.classList.remove('show');
        cards[i].card.classList.remove('dropping');
        cards[i].card.classList.add('done-tz');
        droppedCount++;
        isDropping = false;
        updateCardStyles();
      }, 1000);
    }, 2200);
  }
}

// ── Update card highlight states ──
function updateCardStyles() {
  cards.forEach((c, i) => {
    c.card.classList.remove('next-up','dropping','done-tz');
    c.dot.classList.remove('done-dot','next-dot');
    if (i < droppedCount) {
      c.card.classList.add('done-tz');
      c.dot.classList.add('done-dot');
    } else if (i === droppedCount) {
      c.card.classList.add('next-up');
      c.dot.classList.add('next-dot');
    }
  });
}
updateCardStyles();

// ═══════════════════════════════════════════════════════════════
// COUNTDOWN TICK
// ═══════════════════════════════════════════════════════════════
function secsUntil(t) { return Math.max(0, Math.floor((+t - Date.now()) / 1000)); }
function fmtSecs(s) {
  if (s <= 0) return 'NOW! 🎂';
  const h = Math.floor(s/3600), m = Math.floor((s%3600)/60), sc = s%60;
  return h > 0
    ? `${pad(h)}:${pad(m)}:${pad(sc)}`
    : `${pad(m)}:${pad(sc)}`;
}
function pad(n) { return String(n).padStart(2,'0'); }

function tick() {
  const now = Date.now();
  cards.forEach((c, i) => {
    const s = secsUntil(c.zone.target);
    c.el.textContent = fmtSecs(s);
    if (s === 0) c.el.classList.add('hit');

    // Trigger drop when this zone just hit midnight and hasn't been dropped yet
    if (s <= 1 && i === droppedCount && !isDropping) {
      dropForZone(i);
    }
  });
}
setInterval(tick, 1000);
tick();

// ═══════════════════════════════════════════════════════════════
// TEST BUTTON (hidden in overlay.html)
// ═══════════════════════════════════════════════════════════════
document.getElementById('test-btn').addEventListener('click', () => {
  // Reset all state and simulate final drop
  droppedCount = MIDNIGHT.length - 1;
  isDropping = false;
  ball.style.transition = 'none'; ball.style.top = '0px';
  msg.classList.remove('show');
  banner.classList.remove('show');
  cards.forEach((c,i) => {
    c.card.classList.remove('next-up','dropping','done-tz');
    c.dot.classList.remove('done-dot','next-dot');
    if (i < droppedCount) { c.card.classList.add('done-tz'); c.dot.classList.add('done-dot'); }
    if (i === droppedCount) { c.card.classList.add('next-up'); c.dot.classList.add('next-dot'); }
    c.el.classList.remove('hit');
  });
  setTimeout(() => dropForZone(MIDNIGHT.length - 1), 100);
});

// ═══════════════════════════════════════════════════════════════
// FIREWORKS
// ═══════════════════════════════════════════════════════════════
const fwC=document.getElementById('fireworks-canvas'),fwCtx=fwC.getContext('2d');
let fireworksActive=false,fireworks=[],fwParticles=[];
const FW=['#f472b6','#fb7185','#60a5fa','#93c5fd','#e879f9','#f9a8d4','#bfdbfe','#fff'];
function launchFireworks(){
  fireworksActive=true;
  setTimeout(()=>{fireworksActive=false;},10000);
  requestAnimationFrame(drawFW);
}
function drawFW(){
  fwCtx.clearRect(0,0,900,600);
  fwCtx.fillStyle='rgba(0,0,0,0.12)';fwCtx.fillRect(0,0,900,600);
  if(fireworksActive&&Math.random()<0.07){
    fireworks.push({x:100+Math.random()*700,y:520,tx:100+Math.random()*700,ty:40+Math.random()*300,
      color:FW[Math.floor(Math.random()*FW.length)],speed:8+Math.random()*5});
  }
  fireworks=fireworks.filter(f=>{
    const dx=f.tx-f.x,dy=f.ty-f.y,d=Math.hypot(dx,dy);
    if(d<f.speed){
      for(let i=0;i<70;i++){const a=(Math.PI*2/70)*i,sp=1.8+Math.random()*5;
        fwParticles.push({x:f.x,y:f.y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,color:f.color,life:1});}
      return false;
    }
    f.x+=dx/d*f.speed;f.y+=dy/d*f.speed;
    fwCtx.beginPath();fwCtx.arc(f.x,f.y,3,0,Math.PI*2);fwCtx.fillStyle=f.color;fwCtx.fill();return true;
  });
  fwParticles=fwParticles.filter(p=>{
    p.x+=p.vx;p.y+=p.vy+.07;p.vx*=.97;p.vy*=.97;p.life-=.016;
    fwCtx.globalAlpha=p.life;fwCtx.beginPath();fwCtx.arc(p.x,p.y,2.5,0,Math.PI*2);
    fwCtx.fillStyle=p.color;fwCtx.fill();fwCtx.globalAlpha=1;return p.life>0;
  });
  if(fireworks.length||fwParticles.length||fireworksActive)requestAnimationFrame(drawFW);
  else fwCtx.clearRect(0,0,900,600);
}

// ═══════════════════════════════════════════════════════════════
// CONFETTI
// ═══════════════════════════════════════════════════════════════
const cfC=document.getElementById('confetti-canvas'),cfCtx=cfC.getContext('2d');
let confettiActive=false,cfPieces=[];
const CF=['#f472b6','#fb7185','#60a5fa','#93c5fd','#e879f9','#fbbf24','#fff','#f9a8d4'];
function startConfetti(){
  confettiActive=true;setTimeout(()=>{confettiActive=false;},10000);
  requestAnimationFrame(drawCF);
}
function drawCF(){
  cfCtx.clearRect(0,0,900,600);
  if(confettiActive&&Math.random()<.4)for(let i=0;i<4;i++)
    cfPieces.push({x:Math.random()*900,y:-12,w:5+Math.random()*9,h:9+Math.random()*7,
      color:CF[Math.floor(Math.random()*CF.length)],
      vx:(Math.random()-.5)*3.5,vy:2+Math.random()*3.5,
      rot:Math.random()*Math.PI*2,rotV:(Math.random()-.5)*.18});
  cfPieces=cfPieces.filter(p=>{
    p.x+=p.vx;p.y+=p.vy;p.rot+=p.rotV;
    cfCtx.save();cfCtx.translate(p.x,p.y);cfCtx.rotate(p.rot);
    cfCtx.fillStyle=p.color;cfCtx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
    cfCtx.restore();return p.y<620;
  });
  if(cfPieces.length||confettiActive)requestAnimationFrame(drawCF);
}

// ═══════════════════════════════════════════════════════════════
// SPARKLES
// ═══════════════════════════════════════════════════════════════
const spC=document.getElementById('sparkle-canvas'),spCtx=spC.getContext('2d');
let sparklesActive=false,sparkles=[];
function startSparkles(){
  sparklesActive=true;setTimeout(()=>{sparklesActive=false;},11000);
  requestAnimationFrame(drawSP);
}
function drawSP(){
  spCtx.clearRect(0,0,900,600);
  if(sparklesActive&&Math.random()<.45){
    const hue=Math.random()<.5?330+Math.random()*30:200+Math.random()*30;
    sparkles.push({x:Math.random()*900,y:Math.random()*600,r:1+Math.random()*3.5,life:1,color:`hsl(${hue},100%,78%)`});
  }
  sparkles=sparkles.filter(s=>{
    s.life-=.028;spCtx.globalAlpha=s.life;
    const r=s.r,x=s.x,y=s.y;spCtx.beginPath();
    spCtx.moveTo(x,y-r*3);spCtx.lineTo(x+r*.7,y-r*.7);
    spCtx.lineTo(x+r*3,y);spCtx.lineTo(x+r*.7,y+r*.7);
    spCtx.lineTo(x,y+r*3);spCtx.lineTo(x-r*.7,y+r*.7);
    spCtx.lineTo(x-r*3,y);spCtx.lineTo(x-r*.7,y-r*.7);
    spCtx.closePath();spCtx.fillStyle=s.color;spCtx.fill();
    spCtx.globalAlpha=1;return s.life>0;
  });
  if(sparkles.length||sparklesActive)requestAnimationFrame(drawSP);
}
</script>
</body>
</html>
