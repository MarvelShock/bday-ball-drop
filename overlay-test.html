<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Birthday Overlay – Test</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 900px; height: 600px;
      overflow: hidden;
      background: #0a0014;
      font-family: 'Segoe UI', sans-serif;
    }
    #scene {
      position: relative;
      width: 900px; height: 600px;
      overflow: hidden;
    }
    /* ── Countdown ── */
    #countdown-wrap {
      position: absolute;
      top: 18px; left: 50%;
      transform: translateX(-50%);
      display: flex; gap: 18px;
      z-index: 20;
    }
    .tz-block {
      background: rgba(10,0,30,0.72);
      border: 1px solid rgba(180,100,255,0.4);
      border-radius: 12px;
      padding: 10px 16px;
      text-align: center;
      min-width: 130px;
      backdrop-filter: blur(4px);
    }
    .tz-label { font-size: 0.65rem; color: #a78bfa; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px; }
    .tz-time  { font-size: 1.55rem; font-weight: 700; color: #fff; letter-spacing: 2px; font-variant-numeric: tabular-nums; }
    .tz-time.done { color: #f472b6; }

    /* ── Ball ── */
    #pole {
      position: absolute;
      left: 50%; top: 0;
      transform: translateX(-50%);
      width: 3px; height: 480px;
      background: linear-gradient(to bottom, #6d28d9, #1e1b4b);
      border-radius: 2px;
    }
    #ball {
      position: absolute;
      left: 50%; top: 0;
      transform: translate(-50%, -50%);
      width: 52px; height: 52px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #fff 5%, #f9a8d4 25%, #c084fc 55%, #7c3aed 100%);
      box-shadow: 0 0 20px 6px #c084fc, 0 0 40px 10px #7c3aed55;
      transition: top 2s cubic-bezier(.4,0,.2,1);
      z-index: 16;
    }
    #ball.dropped { top: 480px; }

    /* ── Message ── */
    #message {
      position: absolute;
      bottom: 60px; left: 50%;
      transform: translateX(-50%);
      font-size: 2.8rem;
      font-weight: 900;
      background: linear-gradient(135deg, #ff69b4, #c084fc, #60a5fa, #fbbf24);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-align: center;
      white-space: nowrap;
      opacity: 0;
      transition: opacity 1s ease 0.5s;
      z-index: 25;
      filter: drop-shadow(0 0 12px #c084fc);
    }
    #message.show { opacity: 1; }

    /* ── Canvas layers ── */
    canvas {
      position: absolute;
      top: 0; left: 0;
      width: 900px; height: 600px;
      pointer-events: none;
    }
    #fireworks-canvas { z-index: 10; }
    #confetti-canvas  { z-index: 11; }
    #sparkle-canvas   { z-index: 12; }

    /* ── Test Button ── */
    #test-btn {
      position: absolute;
      bottom: 14px; right: 14px;
      z-index: 30;
      background: linear-gradient(135deg, #7c3aed, #db2777);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 12px 22px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 18px rgba(192,132,252,0.5);
      transition: opacity 0.2s;
      letter-spacing: 0.5px;
    }
    #test-btn:hover { opacity: 0.88; }
  </style>
</head>
<body>
<div id="scene">
  <canvas id="fireworks-canvas" width="900" height="600"></canvas>
  <canvas id="confetti-canvas"  width="900" height="600"></canvas>
  <canvas id="sparkle-canvas"   width="900" height="600"></canvas>

  <div id="countdown-wrap">
    <div class="tz-block"><div class="tz-label">Eastern</div><div class="tz-time" id="ct-et">--:--:--</div></div>
    <div class="tz-block"><div class="tz-label">Central</div><div class="tz-time" id="ct-ct">--:--:--</div></div>
    <div class="tz-block"><div class="tz-label">Mountain</div><div class="tz-time" id="ct-mt">--:--:--</div></div>
    <div class="tz-block"><div class="tz-label">Pacific</div><div class="tz-time" id="ct-pt">--:--:--</div></div>
  </div>

  <div id="pole"></div>
  <div id="ball"></div>
  <div id="message">🎉 Happy Birthday Nicole! 🎂</div>
  <button id="test-btn">🎉 Test Celebration</button>
</div>

<script>
const BDAY_MONTH = 7;
const BDAY_DAY   = 16;
const ZONES = [
  { id: 'ct-et', tz: 'America/New_York' },
  { id: 'ct-ct', tz: 'America/Chicago' },
  { id: 'ct-mt', tz: 'America/Denver' },
  { id: 'ct-pt', tz: 'America/Los_Angeles' },
];

function targetMidnight(tz) {
  const formatter = new Intl.DateTimeFormat('en-US', {
    timeZone: tz,
    year: 'numeric', month: '2-digit', day: '2-digit',
    hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false
  });
  let lo = new Date(new Date().getFullYear(), BDAY_MONTH-1, BDAY_DAY, 0, 0, 0);
  lo = new Date(lo.getTime() - 14*3600000);
  let hi = new Date(lo.getTime() + 28*3600000);
  for (let i = 0; i < 40; i++) {
    const mid = new Date((lo.getTime() + hi.getTime()) / 2);
    const parts = formatter.formatToParts(mid);
    const p = {}; parts.forEach(x => p[x.type] = x.value);
    const h = parseInt(p.hour), m = parseInt(p.minute), s = parseInt(p.second);
    const d = parseInt(p.day), mo = parseInt(p.month);
    if (mo === BDAY_MONTH && d === BDAY_DAY && h === 0 && m === 0 && s === 0) return mid;
    const past = (mo > BDAY_MONTH) || (mo === BDAY_MONTH && d > BDAY_DAY) ||
                 (mo === BDAY_MONTH && d === BDAY_DAY && (h > 0 || m > 0 || s > 0));
    if (past) hi = mid; else lo = mid;
  }
  return lo;
}

function secsUntil(t) { return Math.max(0, Math.floor((t - Date.now()) / 1000)); }
function fmtCountdown(s) {
  if (s <= 0) return 'NOW! 🎂';
  const h = Math.floor(s/3600), m = Math.floor((s%3600)/60), sc = s%60;
  if (h > 0) return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(sc).padStart(2,'0')}`;
  return `${String(m).padStart(2,'0')}:${String(sc).padStart(2,'0')}`;
}

const targets = {};
ZONES.forEach(z => { targets[z.id] = targetMidnight(z.tz); });

let celebrated = false;
function tickCountdown() {
  ZONES.forEach(z => {
    const s = secsUntil(targets[z.id]);
    const el = document.getElementById(z.id);
    el.textContent = fmtCountdown(s);
    if (s === 0) el.classList.add('done');
  });
  if (secsUntil(targets['ct-et']) <= 0 && !celebrated) triggerCelebration();
}
setInterval(tickCountdown, 1000);
tickCountdown();

let ballDropped = false;
function dropBall() {
  if (ballDropped) return;
  ballDropped = true;
  document.getElementById('ball').classList.add('dropped');
  setTimeout(() => document.getElementById('message').classList.add('show'), 2200);
}

function triggerCelebration() {
  if (celebrated) return;
  celebrated = true;
  dropBall();
  launchFireworks();
  startConfetti();
  startSparkles();
}

document.getElementById('test-btn').addEventListener('click', () => {
  celebrated = false; ballDropped = false;
  document.getElementById('ball').classList.remove('dropped');
  document.getElementById('message').classList.remove('show');
  setTimeout(triggerCelebration, 100);
});

// ─────────── Fireworks ───────────
const fwC = document.getElementById('fireworks-canvas');
const fwCtx = fwC.getContext('2d');
let fireworksActive = false, fireworks = [], fwParticles = [];
function launchFireworks() {
  fireworksActive = true;
  setTimeout(() => { fireworksActive = false; }, 8000);
  requestAnimationFrame(drawFireworks);
}
function drawFireworks() {
  fwCtx.clearRect(0,0,900,600);
  fwCtx.fillStyle = 'rgba(0,0,0,0.15)';
  fwCtx.fillRect(0,0,900,600);
  if (fireworksActive && Math.random() < 0.06) {
    fireworks.push({ x:150+Math.random()*600, y:500, tx:150+Math.random()*600, ty:60+Math.random()*260,
      color:`hsl(${Math.random()*360},100%,60%)`, speed:8+Math.random()*4 });
  }
  fireworks = fireworks.filter(f => {
    const dx=f.tx-f.x,dy=f.ty-f.y,dist=Math.sqrt(dx*dx+dy*dy);
    if (dist<f.speed) {
      for(let i=0;i<60;i++){const a=(Math.PI*2/60)*i,sp=2+Math.random()*4;
        fwParticles.push({x:f.x,y:f.y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,color:f.color,life:1});}
      return false;
    }
    f.x+=(dx/dist)*f.speed; f.y+=(dy/dist)*f.speed;
    fwCtx.beginPath(); fwCtx.arc(f.x,f.y,3,0,Math.PI*2);
    fwCtx.fillStyle=f.color; fwCtx.fill(); return true;
  });
  fwParticles = fwParticles.filter(p=>{
    p.x+=p.vx; p.y+=p.vy+0.06; p.vx*=0.97; p.vy*=0.97; p.life-=0.018;
    fwCtx.globalAlpha=p.life; fwCtx.beginPath(); fwCtx.arc(p.x,p.y,2.5,0,Math.PI*2);
    fwCtx.fillStyle=p.color; fwCtx.fill(); fwCtx.globalAlpha=1; return p.life>0;
  });
  if(fireworks.length||fwParticles.length||fireworksActive) requestAnimationFrame(drawFireworks);
  else fwCtx.clearRect(0,0,900,600);
}

// ─────────── Confetti ───────────
const cfC = document.getElementById('confetti-canvas');
const cfCtx = cfC.getContext('2d');
let confettiActive=false, confettiPieces=[];
const CF_COLORS=['#ff69b4','#c084fc','#60a5fa','#fbbf24','#34d399','#f87171','#fff'];
function startConfetti(){
  confettiActive=true;
  setTimeout(()=>{confettiActive=false;},8000);
  requestAnimationFrame(drawConfetti);
}
function drawConfetti(){
  cfCtx.clearRect(0,0,900,600);
  if(confettiActive&&Math.random()<0.35){
    for(let i=0;i<3;i++) confettiPieces.push({x:Math.random()*900,y:-10,
      w:6+Math.random()*8,h:10+Math.random()*6,
      color:CF_COLORS[Math.floor(Math.random()*CF_COLORS.length)],
      vx:(Math.random()-0.5)*3,vy:2+Math.random()*3,
      rot:Math.random()*Math.PI*2,rotV:(Math.random()-0.5)*0.15});
  }
  confettiPieces=confettiPieces.filter(p=>{
    p.x+=p.vx;p.y+=p.vy;p.rot+=p.rotV;
    cfCtx.save();cfCtx.translate(p.x,p.y);cfCtx.rotate(p.rot);
    cfCtx.fillStyle=p.color;cfCtx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
    cfCtx.restore();return p.y<620;
  });
  if(confettiPieces.length||confettiActive) requestAnimationFrame(drawConfetti);
}

// ─────────── Sparkles ───────────
const spC = document.getElementById('sparkle-canvas');
const spCtx = spC.getContext('2d');
let sparklesActive=false, sparkles=[];
function startSparkles(){
  sparklesActive=true;
  setTimeout(()=>{sparklesActive=false;},9000);
  requestAnimationFrame(drawSparkles);
}
function drawSparkles(){
  spCtx.clearRect(0,0,900,600);
  if(sparklesActive&&Math.random()<0.4){
    sparkles.push({x:Math.random()*900,y:Math.random()*600,
      r:1+Math.random()*3,life:1,color:`hsl(${280+Math.random()*80},100%,80%)`});
  }
  sparkles=sparkles.filter(s=>{
    s.life-=0.03;
    spCtx.globalAlpha=s.life;
    spCtx.beginPath();
    const r=s.r,x=s.x,y=s.y;
    spCtx.moveTo(x,y-r*3);spCtx.lineTo(x+r*0.7,y-r*0.7);
    spCtx.lineTo(x+r*3,y);spCtx.lineTo(x+r*0.7,y+r*0.7);
    spCtx.lineTo(x,y+r*3);spCtx.lineTo(x-r*0.7,y+r*0.7);
    spCtx.lineTo(x-r*3,y);spCtx.lineTo(x-r*0.7,y-r*0.7);
    spCtx.closePath();spCtx.fillStyle=s.color;spCtx.fill();
    spCtx.globalAlpha=1;return s.life>0;
  });
  if(sparkles.length||sparklesActive) requestAnimationFrame(drawSparkles);
}
</script>
</body>
</html>
